<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" fill="none">
  <!-- MacBook Air 15" Midnight lid - matching real photo proportions -->
  <defs>
    <linearGradient id="lidGrad" x1="0" y1="0" x2="1500" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e2d4a"/>
      <stop offset="50%" stop-color="#1a2844"/>
      <stop offset="100%" stop-color="#16223c"/>
    </linearGradient>
    <linearGradient id="sheen" x1="100" y1="0" x2="1000" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-3%" width="108%" height="110%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Main lid body — 5:3ish ratio like real MacBook Air 15" -->
  <rect x="50" y="40" width="1400" height="920" rx="36" ry="36" fill="url(#lidGrad)" filter="url(#shadow)"/>

  <!-- Subtle sheen -->
  <rect x="50" y="40" width="1400" height="920" rx="36" ry="36" fill="url(#sheen)"/>

  <!-- Edge highlight (top) -->
  <rect x="50" y="40" width="1400" height="2" rx="1" fill="rgba(255,255,255,0.06)"/>
</svg>
